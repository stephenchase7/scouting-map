<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLS NEXT Rules & Regulations</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#f5f5f5; color:#1a1a2e; display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
#sidebar {
  width:280px; min-width:280px; background:#fff; border-right:1px solid #e0e0e0;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow: 2px 0 8px rgba(0,0,0,0.06);
}
#sidebar-header {
  background:linear-gradient(135deg,#8B0000 0%,#cc0000 50%,#8B0000 100%);
  padding:14px; flex-shrink:0;
}
#sidebar-header h1 { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#fff; }
#sidebar-header p { font-size:9px; color:rgba(255,255,255,0.8); margin-top:2px; }

/* Search */
#search-box { padding:12px; border-bottom:1px solid #e0e0e0; background:#fff; flex-shrink:0; }
#search-form { display:flex; gap:8px; }
#search-input {
  flex:1; padding:10px 12px; background:#f8f8f8; border:1px solid #ddd;
  border-radius:6px; color:#1a1a2e; font-size:13px; outline:none;
}
#search-input:focus { border-color:#cc0000; background:#fff; box-shadow:0 0 0 3px rgba(204,0,0,0.1); }
#search-btn {
  padding:10px 16px; background:#cc0000; color:#fff; border:none;
  border-radius:6px; font-size:12px; font-weight:600; cursor:pointer;
  transition:background 0.15s;
}
#search-btn:hover { background:#a00; }
#search-btn:disabled { background:#ccc; cursor:not-allowed; }

/* Nav */
.nav-links { display:flex; gap:4px; padding:8px 10px; border-bottom:1px solid #e0e0e0; background:#fafafa; flex-shrink:0; }
.nav-link {
  flex:1; padding:6px; background:#fff; border:1px solid #ddd;
  border-radius:4px; color:#666; font-size:9px; font-weight:600;
  text-align:center; text-decoration:none; transition:all 0.15s;
}
.nav-link:hover { background:#f0f0f0; color:#1a1a2e; }

/* Documents List */
#docs-section { flex:1; overflow-y:auto; }
.section-header { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#888; font-weight:600; padding:10px 10px 6px; }
#docs-list { padding:0 10px 10px; }
.doc-item {
  display:flex; align-items:center; gap:8px; padding:8px 10px;
  background:#f9f9f9; border:1px solid #e8e8e8; border-radius:5px;
  cursor:pointer; transition:all 0.15s; margin-bottom:4px;
}
.doc-item:hover { background:#f0f0f0; border-color:#cc0000; }
.doc-item.active { background:#fff0f0; border-color:#cc0000; }
.doc-icon { font-size:16px; }
.doc-info { flex:1; }
.doc-title { font-size:11px; font-weight:600; color:#333; }
.doc-pages { font-size:9px; color:#888; }

/* Footer */
#sidebar-footer { padding:8px 10px; background:#fafafa; border-top:1px solid #e0e0e0; flex-shrink:0; }
.stats-row { display:flex; justify-content:space-between; font-size:9px; color:#888; }
.stat-value { font-weight:600; color:#333; }

/* Main Content */
#main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#fff; }
#content-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; border-bottom:1px solid #e0e0e0; background:#fafafa; flex-shrink:0;
}
#content-header h2 { font-size:14px; font-weight:700; color:#1a1a2e; }
.season-badge { background:#cc0000; color:#fff; padding:4px 10px; border-radius:12px; font-size:9px; font-weight:600; }

/* AI Response Panel */
#ai-panel {
  display:none; flex-direction:column; background:#f8fafc;
  border-bottom:2px solid #0ea5e9; flex-shrink:0; max-height:50vh; overflow:hidden;
}
#ai-panel.visible { display:flex; }
.ai-header {
  display:flex; align-items:center; gap:10px; padding:12px 20px;
  background:linear-gradient(135deg, #0ea5e9, #0284c7); color:#fff;
}
.ai-title { font-size:13px; font-weight:700; flex:1; }
.ai-close { background:none; border:none; color:#fff; cursor:pointer; font-size:20px; opacity:0.8; }
.ai-close:hover { opacity:1; }
.ai-body { padding:16px 20px; overflow-y:auto; flex:1; }
.ai-content { font-size:13px; line-height:1.8; color:#333; }
.ai-content p { margin-bottom:12px; }
.ai-loading { display:flex; align-items:center; gap:12px; padding:20px; color:#666; }
.spinner { width:20px; height:20px; border:2px solid #e0e0e0; border-top-color:#0ea5e9; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Page reference links */
.page-ref {
  display:inline-block; background:#e0f2fe; color:#0369a1; padding:2px 8px;
  border-radius:4px; font-size:12px; font-weight:500; cursor:pointer;
  margin:2px 4px 2px 0; transition:background 0.15s;
}
.page-ref:hover { background:#bae6fd; }

/* Document Content */
#document-content { flex:1; overflow-y:auto; background:#fff; }

/* Document Styles */
.doc-container { max-width:900px; margin:0 auto; padding:24px; }

/* Cover Page Style */
.cover-page {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:400px; text-align:center; padding:40px;
}
.cover-logo { font-size:80px; margin-bottom:20px; }
.cover-title { font-size:24px; font-weight:700; color:#1a1a2e; margin-bottom:8px; }
.cover-subtitle { font-size:16px; color:#666; }

/* Section Headers */
.section-title {
  font-size:16px; font-weight:700; color:#1a1a2e; margin:24px 0 12px;
  padding-bottom:6px; border-bottom:2px solid #cc0000;
}
.section-title.roman { font-size:14px; text-transform:uppercase; }

/* Table of Contents */
.toc-container { padding:20px 0; }
.toc-title { font-size:18px; font-weight:700; text-align:center; margin-bottom:20px; }
.toc-item {
  display:flex; justify-content:space-between; padding:6px 0;
  border-bottom:1px dotted #ddd; cursor:pointer;
}
.toc-item:hover { background:#f5f5f5; }
.toc-item-title { font-size:12px; color:#333; }
.toc-item-page { font-size:12px; color:#888; }
.toc-item.sub { padding-left:20px; }
.toc-item.sub .toc-item-title { font-size:11px; }

/* Body Text */
.doc-text {
  font-family: 'Times New Roman', Georgia, serif;
  font-size:13px; line-height:1.7; color:#1a1a2e;
  text-align:justify;
}
.doc-text p { margin-bottom:12px; }

/* Lists */
.doc-list { margin:12px 0 12px 24px; }
.doc-list li { margin-bottom:8px; font-size:13px; line-height:1.6; }
.doc-list.alpha { list-style-type:lower-alpha; }
.doc-list.roman { list-style-type:lower-roman; }

/* Page Break */
.page-marker {
  display:flex; align-items:center; justify-content:center;
  margin:30px 0; padding:12px; background:#f5f5f5;
  border-top:1px dashed #ccc; border-bottom:1px dashed #ccc;
}
.page-number {
  background:#cc0000; color:#fff; padding:4px 14px;
  border-radius:4px; font-size:11px; font-weight:600;
}

/* Semantic HTML Styles for Player Development Guidelines */
.doc-container h1 {
  font-size:22px; font-weight:700; color:#1a1a2e; margin:24px 0 16px;
  padding-bottom:8px; border-bottom:3px solid #cc0000;
}
.doc-container h2 {
  font-size:18px; font-weight:700; color:#1a1a2e; margin:20px 0 12px;
  padding-bottom:6px; border-bottom:2px solid #cc0000;
}
.doc-container h3 {
  font-size:15px; font-weight:600; color:#333; margin:16px 0 10px;
}
.doc-container h4 {
  font-size:13px; font-weight:600; color:#444; margin:12px 0 8px;
}
.doc-container p {
  font-size:13px; line-height:1.7; color:#1a1a2e; margin-bottom:12px;
  text-align:justify;
}
.doc-container ul, .doc-container ol {
  margin:12px 0 12px 24px; font-size:13px; line-height:1.6;
}
.doc-container li { margin-bottom:8px; }
.doc-container table {
  width:100%; border-collapse:collapse; margin:16px 0;
  font-size:12px; background:#fff;
}
.doc-container th {
  background:#1a1a2e; color:#fff; padding:10px 12px;
  text-align:left; font-weight:600; border:1px solid #333;
}
.doc-container td {
  padding:8px 12px; border:1px solid #ddd; vertical-align:top;
}
.doc-container tr:nth-child(even) td { background:#f9f9f9; }
.doc-container tr:hover td { background:#f0f0f0; }
.doc-container .commentary {
  background:#fff8e1; border-left:4px solid #ffc107;
  padding:12px 16px; margin:16px 0; font-style:italic;
  font-size:12px; color:#666;
}
.doc-container .toc {
  background:#f5f5f5; padding:20px; border-radius:6px;
  margin:20px 0;
}
.doc-container .toc h2 { border-bottom:none; margin-top:0; }
.doc-container .toc ul { list-style:none; margin-left:0; }
.doc-container .toc li { margin-bottom:6px; }
.doc-container .toc a {
  color:#cc0000; text-decoration:none; font-size:12px;
}
.doc-container .toc a:hover { text-decoration:underline; }

/* Subtitle */
.doc-container .subtitle {
  font-size:14px; color:#666; font-style:italic; margin:-10px 0 20px;
}

/* Definition Lists */
.doc-container dl { margin:16px 0; }
.doc-container dt {
  font-weight:600; color:#1a1a2e; margin-top:12px;
}
.doc-container dd {
  margin:4px 0 12px 20px; font-size:13px; line-height:1.6;
}

/* Blockquotes */
.doc-container blockquote {
  background:#f9f9f9; border-left:4px solid #cc0000;
  padding:12px 16px; margin:16px 0; font-size:13px;
}

/* Strong/Bold emphasis */
.doc-container strong { color:#1a1a2e; }

/* Nested TOC styling */
.doc-container .toc ul ul {
  margin:6px 0 6px 20px;
}
.doc-container .toc ul ul li {
  font-size:11px;
}
.doc-container .toc ul ul a {
  color:#666;
}

/* Calendar Month Table Styles */
.calendar-months-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; margin:20px 0;
}
.calendar-month-wrapper {
  background:#fff; border:2px solid #000; border-radius:0;
}
.calendar-month-wrapper h4 {
  background:#1a1a2e; color:#fff; margin:0; padding:8px;
  text-align:center; font-size:12px; font-weight:600;
}
.calendar-month-table {
  width:100%; border-collapse:collapse; font-size:12px;
}
.calendar-month-table th {
  background:#f5f5f5; color:#333; padding:6px 4px;
  text-align:center; font-weight:600; font-size:10px;
  border:1px solid #000;
}
.calendar-month-table td {
  padding:6px 4px; text-align:center; border:1px solid #000;
  font-size:11px; min-width:28px;
}
.calendar-month-table td.open { background:#90EE90; }
.calendar-month-table td.initial { background:#87CEEB; }
.calendar-month-table td.closed { background:#DC143C; color:#fff; }
.calendar-month-table td.trial { background:#FFD700; }
.calendar-month-table td.movement { background:#DDA0DD; }
.calendar-month-table td.freeze { background:#FFA500; }

/* Player Movement Specific Styles */
.pm-header {
  background:linear-gradient(135deg, #00d4ff, #00b8e6);
  padding:16px 20px; margin:-24px -24px 20px -24px;
}
.pm-header h1 { font-size:20px; font-weight:700; color:#000; margin-bottom:4px; }
.pm-section {
  display:flex; border:1px solid #ddd; margin-bottom:16px; border-radius:6px; overflow:hidden;
}
.pm-section-label {
  width:120px; background:#f5f5f5; padding:12px; font-weight:700;
  font-size:12px; color:#333; border-right:1px solid #ddd;
  display:flex; align-items:center;
}
.pm-section-content { flex:1; padding:12px; font-size:12px; line-height:1.6; }
.pm-highlight {
  background:#fff3cd; padding:12px; border-radius:4px;
  margin:12px 0; font-size:11px; text-align:center;
}

/* Calendar */
.calendar-container { margin:20px 0; }
.calendar-title { font-size:16px; font-weight:700; text-align:center; margin-bottom:16px; }
.calendar-legend { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-bottom:20px; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:11px; }
.legend-color { width:16px; height:16px; border-radius:3px; border:1px solid rgba(0,0,0,0.1); }
.calendar-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; }
.calendar-month { background:#fff; border:1px solid #e0e0e0; border-radius:6px; overflow:hidden; }
.month-header { background:#1a1a2e; color:#fff; padding:8px; text-align:center; font-size:11px; font-weight:600; }
.month-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:1px; padding:6px; }
.day-header { text-align:center; font-size:9px; font-weight:600; color:#666; padding:4px 2px; }
.day-cell { text-align:center; font-size:10px; padding:4px 2px; min-height:24px; display:flex; align-items:center; justify-content:center; border-radius:2px; }
.day-cell.empty { background:#fafafa; }
.day-cell.open { background:#90EE90; }
.day-cell.initial { background:#87CEEB; }
.day-cell.closed { background:#DC143C; color:#fff; }
.day-cell.trial { background:#FFD700; }
.day-cell.movement { background:#DDA0DD; }
.day-cell.freeze { background:#FFA500; }

/* Empty/Loading States */
.empty-state { text-align:center; padding:60px 20px; color:#888; }
.empty-state h3 { font-size:16px; margin-bottom:8px; color:#666; }
.empty-state p { font-size:12px; }

/* Page Footer */
#page-footer { padding:8px 20px; background:#fafafa; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; flex-shrink:0; }
#page-footer span { font-size:9px; color:#888; font-style:italic; }

/* Highlight animation */
.highlight-flash {
  animation: flash 2s ease-out;
}
@keyframes flash {
  0%, 50% { background:#FFEB3B; }
  100% { background:transparent; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>MLS NEXT Rules</h1>
    <p>AI-Powered Search</p>
  </div>

  <div id="search-box">
    <form id="search-form" onsubmit="handleSearch(event)">
      <input type="text" id="search-input" placeholder="Ask a question about the rules...">
      <button type="submit" id="search-btn">Ask</button>
    </form>
  </div>

  <div class="nav-links">
    <a href="index.html" class="nav-link">Map</a>
    <a href="team.html" class="nav-link">Teams</a>
    <a href="scouts.html" class="nav-link">Scouts</a>
    <a href="validation.html" class="nav-link">Validation</a>
  </div>

  <div id="docs-section">
    <div class="section-header">Documents</div>
    <div id="docs-list"></div>
  </div>

  <div id="sidebar-footer">
    <div class="stats-row">
      <span>Total Pages</span>
      <span class="stat-value" id="total-pages">--</span>
    </div>
    <div class="stats-row" style="margin-top:3px;">
      <span>Documents</span>
      <span class="stat-value" id="total-docs">--</span>
    </div>
  </div>
</div>

<div id="main-content">
  <div id="content-header">
    <h2 id="doc-title">MLS NEXT Rules & Regulations</h2>
    <span class="season-badge">2025-26 Season</span>
  </div>

  <div id="ai-panel">
    <div class="ai-header">
      <span class="ai-title">Answer</span>
      <button class="ai-close" onclick="closeAI()">&times;</button>
    </div>
    <div class="ai-body">
      <div class="ai-content" id="ai-content"></div>
    </div>
  </div>

  <div id="document-content">
    <div class="empty-state" id="loading-state">
      <h3>Loading Documents...</h3>
      <p>Please wait</p>
    </div>
  </div>

  <div id="page-footer">
    <span>Created by Stephen Chase</span>
  </div>
</div>

<script>
var rulesData = null;
var currentDoc = 0;

// Calendar periods for Player Movement
var calendarPeriods = [
  { start:'2025-06-24', end:'2025-07-14', type:'open' },
  { start:'2025-07-15', end:'2025-08-22', type:'initial' },
  { start:'2025-08-23', end:'2025-10-19', type:'closed' },
  { start:'2025-10-20', end:'2026-01-31', type:'trial' },
  { start:'2026-01-01', end:'2026-01-31', type:'movement' },
  { start:'2026-04-18', end:'2026-05-31', type:'freeze' }
];

async function loadRulesData() {
  try {
    var response = await fetch('./rules_data/rules_web.json');
    rulesData = await response.json();
    renderDocsList();
    renderStats();
    if (rulesData.combined && rulesData.combined.documents.length > 0) {
      showDocument(0);
    }
  } catch (error) {
    console.error('Failed to load:', error);
    document.getElementById('document-content').innerHTML =
      '<div class="empty-state"><h3>Failed to Load</h3><p>Run: python3 rules_processor.py web</p></div>';
  }
}

function renderDocsList() {
  var list = document.getElementById('docs-list');
  var docs = rulesData.combined ? rulesData.combined.documents : [];
  var icons = ['📘', '🔄', '📗', '📕'];

  list.innerHTML = docs.map(function(doc, i) {
    var pageCount = (doc.text.match(/PAGE\s+\d+/gi) || []).length || '~';
    return '<div class="doc-item' + (i === 0 ? ' active' : '') + '" onclick="showDocument(' + i + ')">' +
      '<span class="doc-icon">' + (icons[i] || '📄') + '</span>' +
      '<div class="doc-info">' +
        '<div class="doc-title">' + escapeHtml(doc.name) + '</div>' +
        '<div class="doc-pages">' + pageCount + ' pages</div>' +
      '</div></div>';
  }).join('');
}

function renderStats() {
  var combined = rulesData.combined;
  if (combined) {
    document.getElementById('total-pages').textContent = combined.totalPages || '108';
    document.getElementById('total-docs').textContent = combined.documents ? combined.documents.length : '4';
  }
}

async function showDocument(index) {
  var docs = rulesData.combined ? rulesData.combined.documents : [];
  if (!docs[index]) return;

  currentDoc = index;
  var doc = docs[index];

  // Update active state
  document.querySelectorAll('.doc-item').forEach(function(item, i) {
    item.classList.toggle('active', i === index);
  });
  document.getElementById('doc-title').textContent = doc.name;

  // Render document
  var content = document.getElementById('document-content');

  // Check if we have a pre-formatted HTML file for this document
  if (doc.name.indexOf('Player Development') !== -1) {
    try {
      var response = await fetch('./player_development_guidelines.html');
      var htmlContent = await response.text();
      content.innerHTML = '<div class="doc-container">' + htmlContent + '</div>';
      content.scrollTop = 0;
      return;
    } catch (e) {
      console.log('Falling back to JSON content');
    }
  }

  // Check for Player Movement Guidelines
  if (doc.name.indexOf('Movement') !== -1) {
    try {
      var response = await fetch('./player_movement_guidelines.html');
      var htmlContent = await response.text();
      content.innerHTML = '<div class="doc-container">' + htmlContent + '</div>';
      content.scrollTop = 0;
      return;
    } catch (e) {
      console.log('Falling back to JSON content for Movement');
    }
  }

  // Check for Academy Division Rules & Regulations
  if (doc.name.indexOf('Academy') !== -1 && doc.name.indexOf('Rules') !== -1) {
    try {
      var response = await fetch('./academy_rules_regulations.html');
      var htmlContent = await response.text();
      content.innerHTML = '<div class="doc-container">' + htmlContent + '</div>';
      content.scrollTop = 0;
      return;
    } catch (e) {
      console.log('Falling back to JSON content for Academy Rules');
    }
  }

  // Check for Homegrown Rules & Regulations
  if (doc.name.indexOf('Homegrown') !== -1 || (doc.name.indexOf('Rules') !== -1 && doc.name.indexOf('Academy') === -1)) {
    try {
      var response = await fetch('./homegrown_rules_regulations.html');
      var htmlContent = await response.text();
      content.innerHTML = '<div class="doc-container">' + htmlContent + '</div>';
      content.scrollTop = 0;
      return;
    } catch (e) {
      console.log('Falling back to JSON content for Rules');
    }
  }

  var html = '<div class="doc-container">';

  if (doc.name.indexOf('Movement') !== -1) {
    html += renderPlayerMovementDoc(doc);
  } else {
    html += renderRulesDoc(doc);
  }

  html += '</div>';
  content.innerHTML = html;
  content.scrollTop = 0;
}

function renderPlayerMovementDoc(doc) {
  var html = '';

  // Header
  html += '<div class="pm-header">';
  html += '<h1>2025-26 Homegrown Division Player Movement Guidelines</h1>';
  html += '</div>';

  // Parse and render content by sections
  var text = doc.text;
  var sections = text.split(/(?=Philosophy|Definitions|Regulations|Player Movement Calendar)/gi);

  sections.forEach(function(section) {
    if (!section.trim()) return;

    var lines = section.trim().split('\n');
    var title = lines[0].trim();
    var content = lines.slice(1).join('\n').trim();

    if (title.match(/^(Philosophy|Definitions|Regulations)/i)) {
      html += '<div class="pm-section">';
      html += '<div class="pm-section-label">' + title + '</div>';
      html += '<div class="pm-section-content">' + formatContent(content) + '</div>';
      html += '</div>';
    } else if (title.match(/Calendar/i)) {
      html += renderCalendar();
    }
  });

  // Add page markers
  html = addPageMarkers(html, doc.text);

  return html;
}

function renderRulesDoc(doc) {
  var html = '';
  var text = doc.text;

  // Check for cover page (first page usually has centered title)
  var isHD = doc.name.indexOf('Homegrown') !== -1;
  var isAD = doc.name.indexOf('Academy') !== -1;
  var isPD = doc.name.indexOf('Player Development') !== -1;

  if (text.match(/^MLS NEXT/i) || text.match(/^MLS PLAYER/i)) {
    html += '<div class="cover-page">';
    html += '<div class="cover-logo">⚽</div>';
    if (isPD) {
      html += '<div class="cover-title">MLS PLAYER DEVELOPMENT GUIDELINES</div>';
    } else if (isHD) {
      html += '<div class="cover-title">MLS NEXT HOMEGROWN DIVISION</div>';
    } else if (isAD) {
      html += '<div class="cover-title">MLS NEXT ACADEMY DIVISION</div>';
    }
    html += '<div class="cover-subtitle">RULES & REGULATIONS 2025-2026</div>';
    html += '</div>';
    html += '<div class="page-marker" id="page-1"><span class="page-number">PAGE 1</span></div>';
  }

  // Render body content with section headers
  html += '<div class="doc-text">';
  html += formatRulesContent(text);
  html += '</div>';

  return html;
}

function formatRulesContent(text) {
  var html = text;

  // Add page markers - multiple formats:
  // 1. "MLS PLAYER DEVELOPMENT GUIDELINES – PAGE X" format
  html = html.replace(/MLS PLAYER DEVELOPMENT GUIDELINES\s*[–-]\s*PAGE\s*(\d+)/gi, function(match, num) {
    return '</div><div class="page-marker" id="page-' + num + '"><span class="page-number">PAGE ' + num + '</span></div><div class="doc-text">';
  });

  // 2. Standalone numbers at end of lines indicate page breaks (HD/AD rules)
  html = html.replace(/\n(\d{1,2})\n/g, function(match, num) {
    return '\n</div><div class="page-marker" id="page-' + num + '"><span class="page-number">PAGE ' + num + '</span></div><div class="doc-text">\n';
  });

  // Format Roman numeral sections (I. OVERVIEW, II. DEFINITIONS, etc.)
  html = html.replace(/^([IVX]+\.\s+[A-Z][A-Z\s,&\-]+)$/gm, function(match) {
    return '</div><div class="section-title roman">' + match.trim() + '</div><div class="doc-text">';
  });

  // Format lettered subsections (a. Something, b. Something)
  html = html.replace(/^([a-z]\.\s+[A-Z][^\n]+)/gm, '<p><strong>$1</strong></p>');

  // Format numbered subsections (i. something, ii. something)
  html = html.replace(/^\s*(i{1,3}v?|vi{0,3})\.\s+/gm, '<br>&nbsp;&nbsp;&nbsp;&nbsp;$1. ');

  // Convert line breaks to paragraphs
  html = html.replace(/\n\n+/g, '</p><p>');
  html = html.replace(/\n/g, ' ');

  // Clean up
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<div class="doc-text">\s*<\/div>/g, '');

  return html;
}

function renderTableOfContents(text) {
  var tocMatch = text.match(/TABLE OF CONTENTS([\s\S]*?)(?=\nI\.\s+OVERVIEW\n)/i);
  if (!tocMatch) return '';

  var tocText = tocMatch[1];
  var html = '<div class="toc-container">';
  html += '<div class="toc-title">TABLE OF CONTENTS</div>';

  // Parse TOC lines
  var lines = tocText.split('\n').filter(function(l) { return l.trim(); });
  lines.forEach(function(line) {
    var match = line.match(/^([IVX]+\.|[a-z]\.)\s*(.+?)\s*\.{2,}\s*(\d+)/i);
    if (match) {
      var isSub = match[1].match(/^[a-z]\./);
      html += '<div class="toc-item' + (isSub ? ' sub' : '') + '" onclick="scrollToPage(' + match[3] + ')">';
      html += '<span class="toc-item-title">' + match[1] + ' ' + match[2].trim() + '</span>';
      html += '<span class="toc-item-page">' + match[3] + '</span>';
      html += '</div>';
    }
  });

  html += '</div>';
  return html;
}

function renderCalendar() {
  var months = [
    { year:2025, month:5, name:'June 2025' }, { year:2025, month:6, name:'July 2025' },
    { year:2025, month:7, name:'August 2025' }, { year:2025, month:8, name:'September 2025' },
    { year:2025, month:9, name:'October 2025' }, { year:2025, month:10, name:'November 2025' },
    { year:2025, month:11, name:'December 2025' }, { year:2026, month:0, name:'January 2026' },
    { year:2026, month:1, name:'February 2026' }, { year:2026, month:2, name:'March 2026' },
    { year:2026, month:3, name:'April 2026' }, { year:2026, month:4, name:'May 2026' }
  ];

  var html = '<div class="calendar-container">';
  html += '<div class="calendar-title">2025-26 Player Movement Calendar</div>';
  html += '<div class="calendar-legend">';
  html += '<div class="legend-item"><div class="legend-color" style="background:#90EE90;border:1px solid #000"></div>Open Period</div>';
  html += '<div class="legend-item"><div class="legend-color" style="background:#87CEEB;border:1px solid #000"></div>Initial Registration</div>';
  html += '<div class="legend-item"><div class="legend-color" style="background:#DC143C;border:1px solid #000"></div>Closed Period</div>';
  html += '<div class="legend-item"><div class="legend-color" style="background:#FFD700;border:1px solid #000"></div>Trial Period</div>';
  html += '<div class="legend-item"><div class="legend-color" style="background:#DDA0DD;border:1px solid #000"></div>Movement Period</div>';
  html += '<div class="legend-item"><div class="legend-color" style="background:#FFA500;border:1px solid #000"></div>Roster Freeze</div>';
  html += '</div>';
  html += '<div class="calendar-grid">';

  months.forEach(function(m) {
    var firstDay = new Date(m.year, m.month, 1).getDay();
    var daysInMonth = new Date(m.year, m.month + 1, 0).getDate();

    html += '<div class="calendar-month">';
    html += '<div class="month-header">' + m.name + '</div>';
    html += '<div class="month-grid">';

    ['S','M','T','W','T','F','S'].forEach(function(d) {
      html += '<div class="day-header">' + d + '</div>';
    });

    for (var i = 0; i < firstDay; i++) {
      html += '<div class="day-cell empty"></div>';
    }

    for (var day = 1; day <= daysInMonth; day++) {
      var type = getDayType(m.year, m.month, day);
      html += '<div class="day-cell ' + type + '">' + day + '</div>';
    }

    html += '</div></div>';
  });

  html += '</div></div>';
  return html;
}

function getDayType(year, month, day) {
  var date = new Date(year, month, day);
  for (var i = 0; i < calendarPeriods.length; i++) {
    var p = calendarPeriods[i];
    if (date >= new Date(p.start) && date <= new Date(p.end)) {
      return p.type;
    }
  }
  return '';
}

function addPageMarkers(html, text) {
  var pageMatches = text.match(/PAGE\s+(\d+)/gi) || [];
  pageMatches.forEach(function(match) {
    var num = match.match(/\d+/)[0];
    if (html.indexOf('id="page-' + num + '"') === -1) {
      html += '<div class="page-marker" id="page-' + num + '"><span class="page-number">PAGE ' + num + '</span></div>';
    }
  });
  return html;
}

function formatContent(text) {
  return text
    .replace(/•/g, '<br>• ')
    .replace(/\n/g, '<br>')
    .replace(/\*\*\*([^*]+)\*\*\*/g, '<strong>$1</strong>');
}

// AI Search Functions
async function handleSearch(e) {
  e.preventDefault();
  var input = document.getElementById('search-input');
  var btn = document.getElementById('search-btn');
  var question = input.value.trim();

  if (!question) return;

  // Show loading
  var panel = document.getElementById('ai-panel');
  var content = document.getElementById('ai-content');
  panel.classList.add('visible');
  content.innerHTML = '<div class="ai-loading"><div class="spinner"></div>Searching all documents...</div>';
  btn.disabled = true;
  btn.textContent = '...';

  try {
    var response = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: question })
    });

    var data = await response.json();

    if (data.error) {
      content.innerHTML = '<p style="color:#c00;">Error: ' + escapeHtml(data.error) + '</p>';
    } else {
      content.innerHTML = formatAIResponse(data.answer);
    }
  } catch (err) {
    content.innerHTML = '<p style="color:#c00;">Failed to connect to server. Make sure rules_server.py is running.</p>';
  }

  btn.disabled = false;
  btn.textContent = 'Ask';
}

function formatAIResponse(text) {
  // Convert markdown-style formatting
  var html = text
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  // Convert page references to clickable links
  // Matches: [Page X - Document Name] or [Page X]
  html = html.replace(/\[Page\s+(\d+)(?:\s*[-–]\s*([^\]]+))?\]/gi, function(match, pageNum, docName) {
    var label = docName ? 'Page ' + pageNum + ' - ' + docName : 'Page ' + pageNum;
    var docNameEscaped = docName ? docName.replace(/'/g, "\\'") : '';
    return '<span class="page-ref" onclick="navigateToPage(' + pageNum + ', \'' + docNameEscaped + '\')">' + label + '</span>';
  });

  return '<p>' + html + '</p>';
}

function findDocumentIndex(docName) {
  if (!docName || !rulesData || !rulesData.combined) return -1;
  var docs = rulesData.combined.documents;
  var nameLower = docName.toLowerCase().trim();

  for (var i = 0; i < docs.length; i++) {
    var docTitle = docs[i].name.toLowerCase();
    // Check for partial matches
    if (nameLower.indexOf('player development') !== -1 && docTitle.indexOf('player development') !== -1) return i;
    if (nameLower.indexOf('movement') !== -1 && docTitle.indexOf('movement') !== -1) return i;
    if (nameLower.indexOf('homegrown') !== -1 && docTitle.indexOf('homegrown') !== -1) return i;
    if (nameLower.indexOf('academy') !== -1 && docTitle.indexOf('academy') !== -1) return i;
    if ((nameLower.indexOf('hd') !== -1 || nameLower.indexOf('h.d.') !== -1) && docTitle.indexOf('homegrown') !== -1) return i;
    if ((nameLower.indexOf('ad') !== -1 || nameLower.indexOf('a.d.') !== -1) && docTitle.indexOf('academy') !== -1) return i;
  }
  return -1;
}

function navigateToPage(pageNum, docName) {
  // First, find which document contains this reference
  var docIndex = findDocumentIndex(docName);

  if (docIndex !== -1 && docIndex !== currentDoc) {
    // Switch to the correct document first, then scroll
    showDocument(docIndex).then(function() {
      setTimeout(function() { scrollToPageMarker(pageNum); }, 200);
    });
  } else {
    // Already in the right document, just scroll
    scrollToPageMarker(pageNum);
  }
}

function scrollToPageMarker(pageNum) {
  var content = document.getElementById('document-content');
  var pageMarkers = content.querySelectorAll('.page-marker');

  for (var i = 0; i < pageMarkers.length; i++) {
    var marker = pageMarkers[i];
    var text = marker.textContent || marker.innerText;
    if (text.indexOf('Page ' + pageNum) !== -1 || text.indexOf('PAGE ' + pageNum) !== -1) {
      marker.scrollIntoView({ behavior: 'smooth', block: 'center' });
      marker.classList.add('highlight-flash');
      setTimeout(function() { marker.classList.remove('highlight-flash'); }, 2000);
      return;
    }
  }

  // If no page marker found, scroll to top
  content.scrollTop = 0;
}

function closeAI() {
  document.getElementById('ai-panel').classList.remove('visible');
}

function escapeHtml(text) {
  if (!text) return '';
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Initialize
loadRulesData();
