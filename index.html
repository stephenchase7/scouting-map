#sidebar {

}

#sidebar-header p { font-size:11px; color:rgba(255,255,255,0.75); margin-top:3px; }

#selected-card {
  background:#111827; border-bottom:1px solid #1e2a45; padding:14px; flex-shrink:0; min-height:90px;
}
#selected-card.empty { display:flex; align-items:center; justify-content:center; }
#selected-card.empty p { color:#4a5568; font-size:12px; font-style:italic; }

#legend {
  padding:12px 14px; border-bottom:1px solid #1e2a45; flex-shrink:0;
}
#legend h3 { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#6b7280; margin-bottom:8px; }
.legend-item { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:11px; color:#9ca3af; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

#club-list { overflow-y:auto; flex:1; padding:8px 0; }
#club-list::-webkit-scrollbar { width:4px; }
#club-list::-webkit-scrollbar-track { background:#0d1220; }
#club-list::-webkit-scrollbar-thumb { background:#2d3748; border-radius:2px; }

.club-item {
  display:flex; align-items:center; gap:10px; padding:7px 14px;
  cursor:pointer; transition:background 0.15s; border-left:3px solid transparent;
}
.club-item:hover { background:#1a2035; }
.club-item.active { background:#1a2035; border-left-color:#cc0000; }
.club-logo-sm { width:28px; height:28px; border-radius:50%; object-fit:contain; background:#1e2a45; flex-shrink:0; }
.club-initials-sm {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; color:#fff; font-size:8px; letter-spacing:0.5px;
}
.club-info { flex:1; min-width:0; }
.club-name { font-size:12px; font-weight:600; color:#e2e8f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.club-meta { font-size:10px; color:#6b7280; }
.tier-badge {
  font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px;
  background:#1e2a45; color:#9ca3af; flex-shrink:0;
}

#map { flex:1; }

.leaflet-popup-content-wrapper {
  background:#0d1220; border:1px solid #1e2a45; border-radius:8px; color:#e0e6f0;
  box-shadow:0 8px 32px rgba(0,0,0,0.7);
}
.leaflet-popup-tip { background:#0d1220; }
.leaflet-popup-content { margin:12px; width:220px!important; }

.popup-inner { }
.popup-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.popup-logo { width:44px; height:44px; border-radius:50%; object-fit:contain; background:#1e2a45; }
.popup-initials {
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; color:#fff; font-size:11px; flex-shrink:0;
}
.popup-title { flex:1; }
.popup-title h3 { font-size:13px; font-weight:700; color:#f1f5f9; line-height:1.2; }
.popup-title small { font-size:10px; color:#6b7280; }
.popup-row { display:flex; justify-content:space-between; font-size:11px; padding:4px 0; border-top:1px solid #1e2a45; }
.popup-label { color:#6b7280; }
.popup-value { color:#e2e8f0; font-weight:600; }
.popup-btn {
  display:block; width:100%; margin-top:10px; padding:7px;
  background:#cc0000; color:#fff; text-align:center; text-decoration:none;
  border-radius:5px; font-size:11px; font-weight:700; letter-spacing:0.5px;
  transition:background 0.2s;
}
.popup-btn:hover { background:#990000; }

.rb-marker {
  position:relative; width:52px; height:52px;
  filter:drop-shadow(0 0 8px rgba(220,0,0,0.9));
}
.club-marker {
  border-radius:50%; border:2.5px solid rgba(255,255,255,0.25);

  box-shadow:0 2px 8px rgba(0,0,0,0.6);

}
.club-marker img { width:100%; height:100%; object-fit:contain; }
.club-marker .ini {

}

.stat-bar-fill { height:4px; border-radius:2px; transition:width 0.3s; }

#search-box {

  {name:"Valeo FC", state:"MA", division:"New England", tier:"HD", lat:42.51, lng:-71.20, logo:"MLS Logos/Valeo FC.png", website:"https://valeofc.com", driveMiles:222, driveTime:"3h 34m", initials:"VFC"},

  // ── VIRGINIA ──
  {name:"Alexandria SA", state:"VA", division:"Virginia", tier:"HD", lat:38.80, lng:-77.05, logo:"MLS Logos/Alexandria SA.jpg", website:"https://alexandria-soccer.org", driveMiles:242, driveTime:"4h 0m", initials:"ASA"},
  {name:"FC Richmond", state:"VA", division:"Virginia", tier:"AD", lat:37.54, lng:-77.43, logo:"MLS Logos/FC Richmond.png", website:"https://fcrichmond.com", driveMiles:382, driveTime:"6h 5m", initials:"FCR"},
  {name:"Loudoun Soccer Club", state:"VA", division:"Virginia", tier:"AD", lat:39.11, lng:-77.56, logo:"MLS Logos/Loudoun Soccer Club.png", website:"https://loudounsoccer.com", driveMiles:258, driveTime:"4h 18m", initials:"LSC"},
  {name:"McLean Youth Soccer", state:"VA", division:"Virginia", tier:"AD", lat:38.935, lng:-77.18, logo:"MLS Logos/McLean Youth Soccer.png", website:"https://mcleansoccer.org", driveMiles:242, driveTime:"4h 2m", initials:"MYS"},
  {name:"Springfield SYC", state:"VA", division:"Virginia", tier:"HD", lat:38.79, lng:-77.19, logo:"MLS Logos/Springfield SYC.jpg", website:"https://sycva.com", driveMiles:240, driveTime:"4h 0m", initials:"SSYC"},
  {name:"The St. James", state:"VA", division:"Virginia", tier:"AD", lat:38.782, lng:-77.20, logo:"MLS Logos/The St. James.png", website:"https://thestjames.com", driveMiles:238, driveTime:"3h 58m", initials:"STJ"},
  {name:"Virginia Revolution SC", state:"VA", division:"Virginia", tier:"AD", lat:37.575, lng:-77.47, logo:"MLS Logos/Virginia Revolution SC.png", website:"https://varevolution.com", driveMiles:384, driveTime:"6h 8m", initials:"VRS"},
  {name:"Virginia Rush", state:"VA", division:"Virginia", tier:"AD", lat:37.02, lng:-76.32, logo:"MLS Logos/Virginia Rush.png", website:"https://varush.com", driveMiles:452, driveTime:"7h 28m", initials:"VRU"}
];

// ── MAP INIT ──
var map = L.map('map', {
  center: [40.82, -74.4],
  zoom: 7,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── RB MARKER ──
function makeRBHtml() {
  return '<div style="width:52px;height:52px;filter:drop-shadow(0 0 10px rgba(220,0,0,0.9));">' +
    '<img src="MLS Logos/NY Red Bulls.png" style="width:100%;height:100%;object-fit:contain;border-radius:50%;border:3px solid #cc0000;background:#fff;box-shadow:0 0 12px rgba(220,0,0,0.8);" />' +
    '</div>';
}

var rbIcon = L.divIcon({
  html: makeRBHtml(),
  className: '',
  iconSize: [52, 52],
  iconAnchor: [26, 26],
  popupAnchor: [0, -30]
});

var rbMarker = L.marker([40.8167, -74.4028], {icon: rbIcon}).addTo(map);
rbMarker.bindPopup(
  '<div class="popup-inner">' +
  '<div class="popup-header">' +
  '<div class="popup-initials" style="background:#cc0000;font-size:14px;">RB</div>' +
  '<div class="popup-title"><h3>NY Red Bulls Training Facility</h3><small>Whippany, NJ — HQ</small></div>' +
  '</div>' +
  '<div class="popup-row"><span class="popup-label">Facility</span><span class="popup-value">MLS HQ</span></div>' +
  '</div>'
);

// ── MARKER BUILDER ──
var markers = [];
var selectedIdx = null;
var currentTierFilter = 'all';
var currentDistanceFilter = 'all';

function getFontSize(txt) {
  if (!txt) return '9px';
  if (txt.length <= 2) return '11px';
  if (txt.length <= 3) return '10px';
  if (txt.length <= 4) return '8px';
  return '7px';
}

function makeClubIcon(club, size) {
  size = size || 38;
  var color = DIVISION_COLORS[club.division] || '#555';
  var inner = '';
  if (club.logo) {
    inner = '<img src="' + club.logo + '" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;border-radius:50%;display:block;" ' +
            'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';" />' +
            '<div style="display:none;width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:' + getFontSize(club.initials) + ';letter-spacing:0.5px;">' + club.initials + '</div>';
  } else {
    inner = '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:' + getFontSize(club.initials) + ';letter-spacing:0.5px;">' + club.initials + '</div>';
  }
  var html = '<div style="position:relative;width:' + size + 'px;height:' + size + 'px;border-radius:50%;border:2.5px solid ' + color + ';box-shadow:0 2px 8px rgba(0,0,0,0.5);overflow:hidden;background:#1e2a45;">' + inner + '</div>';
  return L.divIcon({
    html: html,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -(size/2 + 5)]
  });
}

function makePopupHtml(club) {
  var color = DIVISION_COLORS[club.division] || '#555';
  var logoHtml = '';
  if (club.logo) {
    logoHtml = '<img src="' + club.logo + '" class="popup-logo" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';">' +
               '<div class="popup-initials" style="display:none;background:' + color + ';">' + club.initials + '</div>';
  } else {
    logoHtml = '<div class="popup-initials" style="background:' + color + ';">' + club.initials + '</div>';
  }
  return '<div class="popup-inner">' +
    '<div class="popup-header">' + logoHtml +
    '<div class="popup-title"><h3>' + club.name + '</h3><small>' + club.state + ' &bull; ' + club.division + '</small></div>' +
    '</div>' +
    '<div class="popup-row"><span class="popup-label">Tier</span><span class="popup-value" style="color:' + color + '">MLS Next ' + club.tier + '</span></div>' +
    '<div class="popup-row"><span class="popup-label">Drive from NYRB</span><span class="popup-value">' + club.driveMiles + ' mi &bull; ' + club.driveTime + '</span></div>' +
    '</div>';
}

function makeCardHtml(club) {
  var color = DIVISION_COLORS[club.division] || '#555';
  var logoHtml = '';
  if (club.logo) {
    logoHtml = '<img src="' + club.logo + '" style="width:44px;height:44px;border-radius:50%;object-fit:contain;background:#1e2a45;flex-shrink:0;" ' +
               'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';">' +
               '<div style="display:none;width:44px;height:44px;border-radius:50%;background:' + color + ';align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:' + getFontSize(club.initials) + ';">' + club.initials + '</div>';
  } else {
    logoHtml = '<div style="width:44px;height:44px;border-radius:50%;background:' + color + ';display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:' + getFontSize(club.initials) + ';">' + club.initials + '</div>';
  }
  return '<div style="display:flex;align-items:center;gap:12px;">' +
    logoHtml +
    '<div style="flex:1;min-width:0;">' +
    '<div style="font-size:13px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + club.name + '</div>' +
    '<div style="font-size:11px;color:' + color + ';margin-top:2px;">MLS Next ' + club.tier + ' &bull; ' + club.division + '</div>' +
    '<div style="font-size:11px;color:#9ca3af;margin-top:2px;">' + club.driveMiles + ' mi &bull; ' + club.driveTime + ' from NYRB</div>' +
    '</div>' +
    '</div>' +
    '';
}

// ── RENDER CLUBS ──
clubs.forEach(function(club, idx) {
  var icon = makeClubIcon(club, 38);
  var m = L.marker([club.lat, club.lng], {icon: icon}).addTo(map);
  m.bindPopup(makePopupHtml(club), {maxWidth:250});
  m.on('click', function() { selectClub(idx); });
  markers.push(m);
});

// ── SIDEBAR LIST ──
function buildList(filter, tierFilter, distanceFilter) {
  var list = document.getElementById('club-list');
  list.innerHTML = '';
  filter = (filter || '').toLowerCase();
  tierFilter = tierFilter || 'all';
  distanceFilter = distanceFilter || 'all';
  clubs.forEach(function(club, idx) {
    if (filter && club.name.toLowerCase().indexOf(filter) === -1 && club.division.toLowerCase().indexOf(filter) === -1) return;
    if (tierFilter !== 'all' && club.tier !== tierFilter) return;
    if (distanceFilter !== 'all' && club.driveMiles > distanceFilter) return;
    var color = DIVISION_COLORS[club.division] || '#555';
    var div = document.createElement('div');
    div.className = 'club-item' + (selectedIdx === idx ? ' active' : '');
    div.dataset.idx = idx;
    var logoHtml = '';
    if (club.logo) {
      logoHtml = '<img class="club-logo-sm" src="' + club.logo + '" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';">' +
                 '<div class="club-initials-sm" style="display:none;background:' + color + ';font-size:' + getFontSize(club.initials) + ';">' + club.initials + '</div>';
    } else {
      logoHtml = '<div class="club-initials-sm" style="background:' + color + ';font-size:' + getFontSize(club.initials) + ';">' + club.initials + '</div>';
    }
    div.innerHTML = logoHtml +
      '<div class="club-info">' +
      '<div class="club-name">' + club.name + '</div>' +
      '<div class="club-meta">' + club.state + ' &bull; ' + club.division + '</div>' +
      '</div>' +
      '<div class="tier-badge">' + club.tier + '</div>';
    div.onclick = function() { selectClub(parseInt(this.dataset.idx)); };
    list.appendChild(div);
  });
}

function selectClub(idx) {
  selectedIdx = idx;
  var club = clubs[idx];
  // update card
  var card = document.getElementById('selected-card');
  card.classList.remove('empty');
  card.innerHTML = makeCardHtml(club);
  // pan map
  map.setView([club.lat, club.lng], 9, {animate:true});
  markers[idx].openPopup();
  // rebuild list to show active
  buildList(document.getElementById('search-input').value, currentTierFilter, currentDistanceFilter);
  // scroll active item into view
  setTimeout(function() {
    var active = document.querySelector('.club-item.active');
    if (active) active.scrollIntoView({block:'nearest', behavior:'smooth'});
  }, 100);
}

function filterClubs() {
  var val = document.getElementById('search-input').value;
  buildList(val, currentTierFilter, currentDistanceFilter);
  updateMarkerVisibility(val, currentTierFilter, currentDistanceFilter);
}

function setTierFilter(tier) {
  currentTierFilter = tier;
  document.querySelectorAll('.tier-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.tier === tier);
  });
  filterClubs();
}

function setDistanceFilter(distance) {
  currentDistanceFilter = distance;
  document.querySelectorAll('.distance-btn').forEach(function(btn) {
    var btnDistance = btn.dataset.distance === 'all' ? 'all' : parseInt(btn.dataset.distance);
    btn.classList.toggle('active', btnDistance === distance);
  });
  filterClubs();
}

function updateMarkerVisibility(filter, tierFilter, distanceFilter) {
  filter = (filter || '').toLowerCase();
  tierFilter = tierFilter || 'all';
  distanceFilter = distanceFilter || 'all';
  clubs.forEach(function(club, idx) {
    var matchesSearch = !filter || club.name.toLowerCase().indexOf(filter) !== -1 || club.division.toLowerCase().indexOf(filter) !== -1;
    var matchesTier = tierFilter === 'all' || club.tier === tierFilter;
    var matchesDistance = distanceFilter === 'all' || club.driveMiles <= distanceFilter;
    if (matchesSearch && matchesTier && matchesDistance) {
      markers[idx].addTo(map);
    } else {
      map.removeLayer(markers[idx]);
    }
  });
}

buildList('', 'all', 'all');
</script>
</body>
</html>
