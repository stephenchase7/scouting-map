<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scouting Map – NY Red Bulls</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#0a0e1a; color:#e0e6f0; display:flex; height:100vh; overflow:hidden; }

#sidebar {
  width:320px; min-width:320px; background:#0d1220; border-right:1px solid #1e2a45;
  display:flex; flex-direction:column; overflow:hidden; z-index:1000;
}
#sidebar-header {
  background:linear-gradient(135deg,#8B0000 0%,#cc0000 50%,#8B0000 100%);
  padding:18px 16px; flex-shrink:0;
}
#sidebar-header h1 { font-size:15px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#fff; }
#sidebar-header p { font-size:11px; color:rgba(255,255,255,0.75); margin-top:3px; }

#selected-card {
  background:#111827; border-bottom:1px solid #1e2a45; padding:14px; flex-shrink:0; min-height:90px;
}
#selected-card.empty { display:flex; align-items:center; justify-content:center; }
#selected-card.empty p { color:#4a5568; font-size:12px; font-style:italic; }

#club-list { overflow-y:auto; flex:1; padding:8px 0; }
#club-list::-webkit-scrollbar { width:4px; }
#club-list::-webkit-scrollbar-track { background:#0d1220; }
#club-list::-webkit-scrollbar-thumb { background:#2d3748; border-radius:2px; }

.club-item {
  display:flex; align-items:center; gap:10px; padding:7px 14px;
  cursor:pointer; transition:background 0.15s; border-left:3px solid transparent;
}
.club-item:hover { background:#1a2035; }
.club-item.active { background:#1a2035; border-left-color:#cc0000; }
.club-logo-sm { width:28px; height:28px; border-radius:50%; object-fit:contain; background:#1e2a45; flex-shrink:0; }
.club-initials-sm {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; color:#fff; font-size:8px; letter-spacing:0.5px;
}
.club-info { flex:1; min-width:0; }
.club-name { font-size:12px; font-weight:600; color:#e2e8f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.club-meta { font-size:10px; color:#6b7280; }
.tier-badge {
  font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px;
  background:#1e2a45; color:#9ca3af; flex-shrink:0;
}

#map-container { flex:1; position:relative; }
#map { width:100%; height:100%; }

.leaflet-popup-content-wrapper {
  background:#0d1220; border:1px solid #1e2a45; border-radius:8px; color:#e0e6f0;
  box-shadow:0 8px 32px rgba(0,0,0,0.7);
}
.leaflet-popup-tip { background:#0d1220; }
.leaflet-popup-content { margin:12px; width:220px!important; }

.popup-inner { }
.popup-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.popup-logo { width:44px; height:44px; border-radius:50%; object-fit:contain; background:#1e2a45; }
.popup-initials {
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; color:#fff; font-size:11px; flex-shrink:0;
}
.popup-title { flex:1; }
.popup-title h3 { font-size:13px; font-weight:700; color:#f1f5f9; line-height:1.2; }
.popup-title small { font-size:10px; color:#6b7280; }
.popup-row { display:flex; justify-content:space-between; font-size:11px; padding:4px 0; border-top:1px solid #1e2a45; }
.popup-label { color:#6b7280; }
.popup-value { color:#e2e8f0; font-weight:600; }

.club-marker {
  border-radius:50%; border:2.5px solid rgba(255,255,255,0.25);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.6);
  background:#1e2a45;
  overflow:hidden;
}

#search-box {
  padding:8px 14px; border-bottom:1px solid #1e2a45; flex-shrink:0;
}
#search-input {
  width:100%; padding:7px 10px; background:#1a2035; border:1px solid #2d3748;
  border-radius:5px; color:#e2e8f0; font-size:12px; outline:none;
}
#search-input::placeholder { color:#4a5568; }
#search-input:focus { border-color:#cc0000; }

.filter-section {
  padding:8px 14px; border-bottom:1px solid #1e2a45; flex-shrink:0;
}
.filter-section h3 { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#6b7280; margin-bottom:8px; }
.filter-btns { display:flex; gap:6px; flex-wrap:wrap; }
.filter-btn {
  flex:1; min-width:45px; padding:6px 8px; background:#1a2035; border:1px solid #2d3748;
  border-radius:5px; color:#9ca3af; font-size:10px; font-weight:600;
  cursor:pointer; transition:all 0.15s; text-align:center;
}
.filter-btn:hover { background:#242d42; color:#e2e8f0; }
.filter-btn.active { background:#cc0000; border-color:#cc0000; color:#fff; }

#zoom-controls {
  position:absolute; top:10px; right:10px; z-index:1000;
  display:flex; flex-direction:column; gap:4px;
}
.zoom-btn {
  width:32px; height:32px; background:#0d1220; border:1px solid #1e2a45;
  border-radius:4px; color:#e0e6f0; font-size:18px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.zoom-btn:hover { background:#1a2035; border-color:#cc0000; }

#club-count {
  padding:6px 14px; background:#111827; border-bottom:1px solid #1e2a45;
  font-size:11px; color:#6b7280; flex-shrink:0;
}
#club-count span { color:#cc0000; font-weight:700; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>NY Red Bulls Scouting Map</h1>
    <p>ECNL & MLS Next | Northeast Region</p>
  </div>

  <div id="selected-card" class="empty">
    <p>Click a club to see details</p>
  </div>

  <div id="search-box">
    <input type="text" id="search-input" placeholder="Search clubs..." oninput="applyFilters()">
  </div>

  <div class="filter-section">
    <h3>League</h3>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="league" data-value="all" onclick="setFilter('league','all')">All</button>
      <button class="filter-btn" data-filter="league" data-value="ECNL" onclick="setFilter('league','ECNL')">ECNL</button>
      <button class="filter-btn" data-filter="league" data-value="HD" onclick="setFilter('league','HD')">HD</button>
      <button class="filter-btn" data-filter="league" data-value="AD" onclick="setFilter('league','AD')">AD</button>
    </div>
  </div>

  <div class="filter-section">
    <h3>Conference / Division</h3>
    <div class="filter-btns" id="conf-btns">
      <button class="filter-btn active" data-filter="conf" data-value="all" onclick="setFilter('conf','all')">All</button>
    </div>
  </div>

  <div class="filter-section">
    <h3>Distance from NYRB</h3>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="distance" data-value="all" onclick="setFilter('distance','all')">All</button>
      <button class="filter-btn" data-filter="distance" data-value="50" onclick="setFilter('distance',50)">&lt;50mi</button>
      <button class="filter-btn" data-filter="distance" data-value="100" onclick="setFilter('distance',100)">&lt;100mi</button>
      <button class="filter-btn" data-filter="distance" data-value="200" onclick="setFilter('distance',200)">&lt;200mi</button>
    </div>
  </div>

  <div id="club-count">Showing <span id="count-num">0</span> clubs</div>

  <div id="club-list"></div>
</div>

<div id="map-container">
  <div id="map"></div>
  <div id="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">−</button>
  </div>
</div>

// ── FILTER STATE ──
var filters = {
  league: 'all',
  conf: 'all',
  distance: 'all'
};

// ── MAP INIT ──
var map = L.map('map', {
  center: [40.82, -74.4],
  zoom: 7,
  zoomControl: false,
  zoomSnap: 0.25,
  zoomDelta: 0.5
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── ZOOM CONTROLS ──
function zoomIn() { map.zoomIn(0.5); }
function zoomOut() { map.zoomOut(0.5); }

// ── RB MARKER ──
function makeRBHtml() {
  return '<div style="width:52px;height:52px;filter:drop-shadow(0 0 10px rgba(220,0,0,0.9));">' +
    '<img src="MLS Logos/NY Red Bulls.png" style="width:100%;height:100%;object-fit:contain;border-radius:50%;border:3px solid #cc0000;background:#fff;box-shadow:0 0 12px rgba(220,0,0,0.8);" />' +
    '</div>';
}

var rbIcon = L.divIcon({
  html: makeRBHtml(),
  className: '',
  iconSize: [52, 52],
  iconAnchor: [26, 26],
  popupAnchor: [0, -30]
});

var rbMarker = L.marker([40.8167, -74.4028], {icon: rbIcon}).addTo(map);
rbMarker.bindPopup(
  '<div class="popup-inner">' +
  '<div class="popup-header">' +
  '<div class="popup-initials" style="background:#cc0000;font-size:14px;">RB</div>' +
  '<div class="popup-title"><h3>NY Red Bulls Training Facility</h3><small>Whippany, NJ — HQ</small></div>' +
  '</div>' +
  '<div class="popup-row"><span class="popup-label">Facility</span><span class="popup-value">MLS HQ</span></div>' +
  '</div>'
);

// ── MARKER BUILDER ──
var markers = [];
var selectedIdx = null;

function getFontSize(txt) {
  if (!txt) return '9px';
  if (txt.length <= 2) return '11px';
  if (txt.length <= 3) return '10px';
  if (txt.length <= 4) return '8px';
  return '7px';
}

function getClubColor(club) {
  return DIVISION_COLORS[club.division] || LEAGUE_COLORS[club.league] || '#555';
}

function makeClubIcon(club, size) {
  size = size || 38;
  var color = getClubColor(club);
  var inner = '';
  if (club.logo) {
    inner = '<img src="' + club.logo + '" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;border-radius:50%;display:block;" ' +
            'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';" />' +
            '<div style="display:none;width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:' + getFontSize(club.initials) + ';letter-spacing:0.5px;">' + club.initials + '</div>';
  } else {
    inner = '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:' + getFontSize(club.initials) + ';letter-spacing:0.5px;">' + club.initials + '</div>';
  }
  var html = '<div style="position:relative;width:' + size + 'px;height:' + size + 'px;border-radius:50%;border:2.5px solid ' + color + ';box-shadow:0 2px 8px rgba(0,0,0,0.5);overflow:hidden;background:#1e2a45;">' + inner + '</div>';
  return L.divIcon({
    html: html,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -(size/2 + 5)]
  });
}

function makePopupHtml(club) {
  var color = getClubColor(club);
  var logoHtml = '';
  if (club.logo) {
    logoHtml = '<img src="' + club.logo + '" class="popup-logo" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';">' +
               '<div class="popup-initials" style="display:none;background:' + color + ';">' + club.initials + '</div>';
  } else {
    logoHtml = '<div class="popup-initials" style="background:' + color + ';">' + club.initials + '</div>';
  }
  return '<div class="popup-inner">' +
    '<div class="popup-header">' + logoHtml +
    '<div class="popup-title"><h3>' + club.name + '</h3><small>' + club.state + ' &bull; ' + club.division + '</small></div>' +
    '</div>' +
    '<div class="popup-row"><span class="popup-label">League</span><span class="popup-value" style="color:' + color + '">' + club.league + '</span></div>' +
    '<div class="popup-row"><span class="popup-label">Drive from NYRB</span><span class="popup-value">' + club.driveMiles + ' mi &bull; ' + club.driveTime + '</span></div>' +
    '</div>';
}

function makeCardHtml(club) {
  var color = getClubColor(club);
  var logoHtml = '';
  if (club.logo) {
    logoHtml = '<img src="' + club.logo + '" style="width:44px;height:44px;border-radius:50%;object-fit:contain;background:#1e2a45;flex-shrink:0;" ' +
               'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';">' +
               '<div style="display:none;width:44px;height:44px;border-radius:50%;background:' + color + ';align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:' + getFontSize(club.initials) + ';">' + club.initials + '</div>';
  } else {
    logoHtml = '<div style="width:44px;height:44px;border-radius:50%;background:' + color + ';display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:' + getFontSize(club.initials) + ';">' + club.initials + '</div>';
  }
  return '<div style="display:flex;align-items:center;gap:12px;">' +
    logoHtml +
    '<div style="flex:1;min-width:0;">' +
    '<div style="font-size:13px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + club.name + '</div>' +
    '<div style="font-size:11px;color:' + color + ';margin-top:2px;">' + club.league + ' &bull; ' + club.division + '</div>' +
    '<div style="font-size:11px;color:#9ca3af;margin-top:2px;">' + club.driveMiles + ' mi &bull; ' + club.driveTime + ' from NYRB</div>' +
    '</div>' +
    '</div>';
}

// ── RENDER CLUBS ──
clubs.forEach(function(club, idx) {
  var icon = makeClubIcon(club, 38);
  var m = L.marker([club.lat, club.lng], {icon: icon}).addTo(map);
  m.bindPopup(makePopupHtml(club), {maxWidth:250});
  m.on('click', function() { selectClub(idx); });
  markers.push(m);
});

// ── BUILD CONFERENCE BUTTONS ──
function buildConfButtons() {
  var confs = {};
  clubs.forEach(function(c) {
    if (filters.league === 'all' || filters.league === c.league) {
      confs[c.division] = true;
    }
  });
  var container = document.getElementById('conf-btns');
  container.innerHTML = '<button class="filter-btn' + (filters.conf === 'all' ? ' active' : '') + '" data-filter="conf" data-value="all" onclick="setFilter(\'conf\',\'all\')">All</button>';
  Object.keys(confs).sort().forEach(function(conf) {
    var active = filters.conf === conf ? ' active' : '';
    container.innerHTML += '<button class="filter-btn' + active + '" data-filter="conf" data-value="' + conf + '" onclick="setFilter(\'conf\',\'' + conf + '\')">' + conf + '</button>';
  });
}

// ── SIDEBAR LIST ──
function buildList() {
  var list = document.getElementById('club-list');
  list.innerHTML = '';
  var searchVal = (document.getElementById('search-input').value || '').toLowerCase();
  var count = 0;

  clubs.forEach(function(club, idx) {
    // Search filter
    if (searchVal && club.name.toLowerCase().indexOf(searchVal) === -1 && club.division.toLowerCase().indexOf(searchVal) === -1) return;
    // League filter
    if (filters.league !== 'all' && club.league !== filters.league) return;
    // Conference filter
    if (filters.conf !== 'all' && club.division !== filters.conf) return;
    // Distance filter
    if (filters.distance !== 'all' && club.driveMiles > filters.distance) return;

    count++;
    var color = getClubColor(club);
    var div = document.createElement('div');
    div.className = 'club-item' + (selectedIdx === idx ? ' active' : '');
    div.dataset.idx = idx;
    var logoHtml = '';
    if (club.logo) {
      logoHtml = '<img class="club-logo-sm" src="' + club.logo + '" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';">' +
                 '<div class="club-initials-sm" style="display:none;background:' + color + ';font-size:' + getFontSize(club.initials) + ';">' + club.initials + '</div>';
    } else {
      logoHtml = '<div class="club-initials-sm" style="background:' + color + ';font-size:' + getFontSize(club.initials) + ';">' + club.initials + '</div>';
    }
    div.innerHTML = logoHtml +
      '<div class="club-info">' +
      '<div class="club-name">' + club.name + '</div>' +
      '<div class="club-meta">' + club.state + ' &bull; ' + club.division + '</div>' +
      '</div>' +
      '<div class="tier-badge">' + club.league + '</div>';
    div.onclick = function() { selectClub(parseInt(this.dataset.idx)); };
    list.appendChild(div);
  });

  document.getElementById('count-num').textContent = count;
}

function selectClub(idx) {
  selectedIdx = idx;
  var club = clubs[idx];
  var card = document.getElementById('selected-card');
  card.classList.remove('empty');
  card.innerHTML = makeCardHtml(club);
  map.setView([club.lat, club.lng], 9, {animate:true});
  markers[idx].openPopup();
  buildList();
  setTimeout(function() {
    var active = document.querySelector('.club-item.active');
    if (active) active.scrollIntoView({block:'nearest', behavior:'smooth'});
  }, 100);
}

function updateMarkerVisibility() {
  var searchVal = (document.getElementById('search-input').value || '').toLowerCase();
  clubs.forEach(function(club, idx) {
    var matchesSearch = !searchVal || club.name.toLowerCase().indexOf(searchVal) !== -1 || club.division.toLowerCase().indexOf(searchVal) !== -1;
    var matchesLeague = filters.league === 'all' || club.league === filters.league;
    var matchesConf = filters.conf === 'all' || club.division === filters.conf;
    var matchesDistance = filters.distance === 'all' || club.driveMiles <= filters.distance;
    if (matchesSearch && matchesLeague && matchesConf && matchesDistance) {
      markers[idx].addTo(map);
    } else {
      map.removeLayer(markers[idx]);
    }
  });
}

function setFilter(type, value) {
  filters[type] = value;
  document.querySelectorAll('.filter-btn[data-filter="' + type + '"]').forEach(function(btn) {
    var btnVal = btn.dataset.value;
    if (btnVal === 'all') btnVal = 'all';
    else if (!isNaN(btnVal)) btnVal = parseInt(btnVal);
    btn.classList.toggle('active', btnVal === value);
  });
  if (type === 'league') {
    filters.conf = 'all';
    buildConfButtons();
  }
  applyFilters();
}

function applyFilters() {
  buildList();
  updateMarkerVisibility();
}

// ── INIT ──
buildConfButtons();
buildList();
</script>

</html>
